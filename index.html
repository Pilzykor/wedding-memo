<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>Ana-Marija & Mario | Uspomene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #314839;
      --green2: #405d49;
      --gold: #d6b36a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.9) 0 5%, transparent 18%),
        radial-gradient(circle at 85% 88%, rgba(255,255,255,.85) 0 6%, transparent 20%),
        radial-gradient(circle at 5% 85%, rgba(214,179,106,.22), transparent 25%),
        radial-gradient(circle at 90% 12%, rgba(64,93,73,.18), transparent 24%),
        linear-gradient(135deg, #fbf5ea, #eee1cd);
      font-family: "Cormorant Garamond", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      color: white;
      overflow: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      height: min(830px, 96vh);
      position: relative;
      padding: 14px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 250, 240, .72);
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
    }

    .flower {
      position: absolute;
      color: rgba(49, 72, 57, .22);
      font-size: 82px;
      line-height: 1;
      z-index: 1;
      pointer-events: none;
    }

    .f1 { top: -6px; left: -6px; transform: rotate(-22deg); }
    .f2 { top: 20px; right: -14px; transform: rotate(28deg); }
    .f3 { bottom: 45px; left: -18px; transform: rotate(18deg); }
    .f4 { bottom: 32px; right: -8px; transform: rotate(-18deg); }

    .arch {
      position: relative;
      z-index: 2;
      height: 100%;
      border-radius: 205px 205px 20px 20px;
      border: 2px solid var(--gold);
      padding: 34px 22px 22px;
      text-align: center;
      background:
        radial-gradient(circle at 25% 18%, rgba(255,255,255,.12), transparent 30%),
        radial-gradient(circle at 85% 80%, rgba(214,179,106,.11), transparent 34%),
        linear-gradient(180deg, rgba(64,93,73,.97), rgba(49,72,57,.98));
      box-shadow: inset 0 0 55px rgba(0,0,0,.15);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hearts {
      color: var(--gold);
      font-size: 30px;
      margin-bottom: 12px;
    }

    .top-text {
      font-size: 23px;
      line-height: 1.2;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .divider {
      width: 135px;
      height: 1px;
      margin: 12px auto 22px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      position: relative;
      flex-shrink: 0;
    }

    .divider::after {
      content: "◆";
      color: var(--gold);
      position: absolute;
      left: 50%;
      top: -9px;
      transform: translateX(-50%);
      font-size: 12px;
      background: var(--green2);
      padding: 0 8px;
    }

    .names {
      font-size: clamp(42px, 11vw, 58px);
      text-transform: uppercase;
      letter-spacing: 5px;
      line-height: .94;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .amp {
      color: var(--gold);
      font-size: 40px;
      margin: 8px 0;
      line-height: 1;
    }

    .ornament {
      color: var(--gold);
      font-size: 22px;
      margin: 24px 0 12px;
      letter-spacing: 5px;
    }

    .date {
      margin-top: 8px;
      color: var(--gold);
      font-size: 28px;
      letter-spacing: 7px;
      font-weight: 600;
    }

    .desc {
      font-size: 22px;
      margin: 20px 0 20px;
      line-height: 1.2;
      font-weight: 600;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 14px;
      border-radius: 15px;
      border: 1.8px solid var(--gold);
      background: linear-gradient(180deg, #fffaf0, #efe1c9);
      color: var(--green);
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      transition: .18s ease;
      flex-shrink: 0;
    }

    .upload-btn:active {
      transform: scale(.98);
      box-shadow: 0 7px 18px rgba(0,0,0,.2);
    }

    .thanks {
      color: var(--gold);
      font-size: 28px;
      line-height: 1.1;
      margin-top: auto;
      font-weight: 600;
    }

    .bottom-heart {
      color: var(--gold);
      font-size: 20px;
      margin-top: 8px;
    }

    @media (max-width: 380px) {
      .wrapper {
        height: min(760px, 96vh);
        padding: 10px;
      }

      .arch {
        padding: 30px 17px 18px;
      }

      .hearts {
        font-size: 26px;
        margin-bottom: 8px;
      }

      .top-text {
        font-size: 21px;
      }

      .names {
        font-size: clamp(36px, 11vw, 49px);
        letter-spacing: 4px;
      }

      .amp {
        font-size: 34px;
        margin: 6px 0;
      }

      .date {
        font-size: 24px;
        letter-spacing: 6px;
      }

      .desc {
        font-size: 20px;
        margin: 16px 0 18px;
      }

      .upload-btn {
        font-size: 18px;
        padding: 13px 10px;
      }

      .ornament {
        font-size: 20px;
        margin: 18px 0 10px;
      }

      .thanks {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>
  <main class="wrapper">
    <div class="flower f1">✿</div>
    <div class="flower f2">❀</div>
    <div class="flower f3">✿</div>
    <div class="flower f4">❀</div>

    <section class="arch">
      <div class="hearts">♡♡</div>

      <div class="top-text">
        Podijelite uspomene s nama ❤️
      </div>

      <div class="divider"></div>

      <div class="names">Ana-Marija</div>
      <div class="amp">&</div>
      <div class="names">Mario</div>

      <div class="ornament">— ❦ ♡ ❦ —</div>

      <div class="date">30.05.2026.</div>

      <div class="divider"></div>

      <p class="desc">
        Dodajte svoje fotografije i videe
      </p>

      <a class="upload-btn" href="OVDJE_STAVI_DROPBOX_LINK" target="_blank" rel="noopener">
        ☁️ Dodaj slike i videe
      </a>

      <div class="ornament">❦ ♡ ❦</div>

      <div class="thanks">
        Hvala što ste dio našeg dana!
      </div>

      <div class="bottom-heart">♡</div>
    </section>
  </main>
</body>
</html>
