<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <title>Ana-Marija & Mario | Uspomene</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #314839;
      --green2: #405d49;
      --cream: #fff7e9;
      --gold: #d6b36a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.9) 0 5%, transparent 18%),
        radial-gradient(circle at 85% 88%, rgba(255,255,255,.85) 0 6%, transparent 20%),
        radial-gradient(circle at 5% 85%, rgba(214,179,106,.22), transparent 25%),
        radial-gradient(circle at 90% 12%, rgba(64,93,73,.18), transparent 24%),
        linear-gradient(135deg, #fbf5ea, #eee1cd);
      font-family: "Cormorant Garamond", serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      color: white;
    }

    .wrapper {
      width: 100%;
      max-width: 430px;
      min-height: 92vh;
      position: relative;
      padding: 18px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 250, 240, .72);
      box-shadow: 0 20px 55px rgba(0,0,0,.22);
    }

    .flower {
      position: absolute;
      color: rgba(49, 72, 57, .23);
      font-size: 96px;
      line-height: 1;
      z-index: 1;
      pointer-events: none;
    }

    .f1 { top: -8px; left: -6px; transform: rotate(-22deg); }
    .f2 { top: 22px; right: -14px; transform: rotate(28deg); }
    .f3 { bottom: 52px; left: -18px; transform: rotate(18deg); }
    .f4 { bottom: 36px; right: -8px; transform: rotate(-18deg); }

    .arch {
      position: relative;
      z-index: 2;
      min-height: calc(92vh - 36px);
      border-radius: 210px 210px 20px 20px;
      border: 2px solid var(--gold);
      padding: 46px 24px 30px;
      text-align: center;
      background:
        radial-gradient(circle at 25% 18%, rgba(255,255,255,.12), transparent 30%),
        radial-gradient(circle at 85% 80%, rgba(214,179,106,.11), transparent 34%),
        linear-gradient(180deg, rgba(64,93,73,.97), rgba(49,72,57,.98));
      box-shadow: inset 0 0 55px rgba(0,0,0,.15);
    }

    .hearts {
      color: var(--gold);
      font-size: 38px;
      margin-bottom: 20px;
    }

    .top-text {
      font-size: 26px;
      line-height: 1.25;
      margin-bottom: 20px;
    }

    .divider {
      width: 150px;
      height: 1px;
      margin: 16px auto 28px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      position: relative;
    }

    .divider::after {
      content: "◆";
      color: var(--gold);
      position: absolute;
      left: 50%;
      top: -9px;
      transform: translateX(-50%);
      font-size: 13px;
      background: var(--green2);
      padding: 0 8px;
    }

    .names {
      font-size: clamp(48px, 13vw, 66px);
      text-transform: uppercase;
      letter-spacing: 6px;
      line-height: .95;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0,0,0,.18);
    }

    .amp {
      color: var(--gold);
      font-size: 48px;
      margin: 12px 0;
    }

    .date {
      margin-top: 24px;
      color: var(--gold);
      font-size: 33px;
      letter-spacing: 9px;
    }

    .desc {
      font-size: 27px;
      margin: 30px 0 26px;
      line-height: 1.25;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 18px 16px;
      border-radius: 16px;
      border: 1.8px solid var(--gold);
      background: linear-gradient(180deg, #fffaf0, #efe1c9);
      color: var(--green);
      text-decoration: none;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 12px 28px rgba(0,0,0,.24);
      transition: .18s ease;
    }

    .upload-btn:active {
      transform: scale(.98);
      box-shadow: 0 7px 18px rgba(0,0,0,.2);
    }

    .ornament {
      color: var(--gold);
      font-size: 28px;
      margin: 42px 0 20px;
      letter-spacing: 6px;
    }

    .thanks {
      font-family: "Great Vibes", cursive;
      color: var(--gold);
      font-size: 42px;
      line-height: 1.1;
      margin-top: 30px;
    }

    .bottom-heart {
      color: var(--gold);
      font-size: 23px;
      margin-top: 12px;
    }

    @media (max-width: 380px) {
      .wrapper { padding: 12px; }
      .arch { padding: 38px 18px 26px; }
      .top-text { font-size: 23px; }
      .date { font-size: 28px; letter-spacing: 7px; }
      .desc { font-size: 24px; }
      .upload-btn { font-size: 20px; padding: 16px 12px; }
      .thanks { font-size: 36px; }
    }
  </style>
</head>

<body>
  <main class="wrapper">
    <div class="flower f1">✿</div>
    <div class="flower f2">❀</div>
    <div class="flower f3">✿</div>
    <div class="flower f4">❀</div>

    <section class="arch">
      <div class="hearts">♡</div>

      <div class="top-text">
        Podijelite uspomene s nama ♡
      </div>

      <div class="divider"></div>

      <div class="names">Ana-Marija</div>
      <div class="amp">&</div>
      <div class="names">Mario</div>

      <div class="ornament">— ♡ —</div>

      <div class="date">30.05.2026.</div>

      

      <p class="desc">
        Dodajte svoje fotografije i videe 
      </p>

      <a class="upload-btn" href="https://www.dropbox.com/request/biggqvyepoqv4tu5vqlq" target="_blank" rel="noopener">
        Dodaj slike i videe
      </a>

      <div class="ornament">— ♡ —</div>

      <div class="thanks">
        Hvala što ste dio našeg dana!
      </div>

      <div class="bottom-heart">♡</div>
    </section>
  </main>
</body>
</html>
