      justify-content: center;
      align-items: center;
      height: 100vh;

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;

    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #666;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
    }

    .btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>📸 Podijelite uspomene</h1>

</html>
